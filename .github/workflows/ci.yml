name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Start server
        run: |
          ENGRAM_OPEN_ACCESS=1 node --experimental-strip-types server-split.ts &
          timeout 30 bash -c 'until curl -sf http://127.0.0.1:4200/live > /dev/null 2>&1; do sleep 1; done'

      - name: Contract tests
        env:
          ENGRAM_URL: http://127.0.0.1:4200
        run: node --test tests/api.test.mjs

      - name: SDK import test
        run: node --experimental-strip-types -e "import { Engram } from './sdk/index.ts'; const e = new Engram(); console.log('SDK imports OK');"

      - name: MCP server parse test
        run: node --experimental-strip-types -e "import './mcp-server.ts'" --input-type=module
      - name: Health check
        run: |
          curl -sf http://localhost:4200/live | grep -q '"ok"'
          curl -sf http://localhost:4200/ready | grep -q '"ready"'

      - name: Search contract
        run: |
          curl -sf http://localhost:4200/search -X POST \
            -H "Content-Type: application/json" \
            -d '{"query": "test", "limit": 1}' | node -e "
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              console.assert('results' in d, 'missing results');
              console.assert('abstained' in d, 'missing abstained');
              console.assert('top_score' in d, 'missing top_score');
              console.log('Search contract OK');
            "

      - name: Context contract
        run: |
          curl -sf http://localhost:4200/context -X POST \
            -H "Content-Type: application/json" \
            -d '{"query": "test", "mode": "fast"}' | node -e "
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              console.assert('context' in d, 'missing context');
              console.assert('memories' in d, 'missing memories');
              console.log('Context contract OK');
            "

      - name: Store contract
        run: |
          curl -sf http://localhost:4200/store -X POST \
            -H "Content-Type: application/json" \
            -d '{"content": "CI test memory", "category": "state"}' | node -e "
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              console.assert(d.stored === true, 'not stored');
              console.assert('id' in d, 'missing id');
              console.assert(d.fact_extraction === 'queued' || d.fact_extraction === 'disabled', 'unexpected fact_extraction');
              console.log('Store contract OK, id:', d.id);
            "

  gui-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - run: cd gui && npm install
      - run: cd gui && npx vite build
      - name: Verify build output
        run: test -f gui/build/index.html && echo "GUI build OK"
