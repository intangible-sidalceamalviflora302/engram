var inboxCatColors = {
  task: { bg: 'rgba(129,140,248,0.12)', color: '#818cf8' },
  state: { bg: 'rgba(52,211,153,0.12)', color: '#34d399' },
  discovery: { bg: 'rgba(251,191,36,0.12)', color: '#fbbf24' },
  decision: { bg: 'rgba(244,114,182,0.12)', color: '#f472b6' },
  issue: { bg: 'rgba(248,113,113,0.12)', color: '#f87171' },
  general: { bg: 'rgba(148,163,184,0.12)', color: '#94a3b8' },
};

function inboxEsc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function inboxTimeAgo(dateStr) {
  var d = new Date(dateStr + 'Z');
  var diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function renderInbox() {
  var container = document.getElementById('inbox-list');
  if (!inboxItems.length) {
    container.innerHTML = '<div class="inbox-empty">' +
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>' +
      '<p>Inbox empty</p><small>All memories have been reviewed</small></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < inboxItems.length; i++) {
    var m = inboxItems[i];
    var cc = inboxCatColors[m.category] || inboxCatColors.general;
    var checked = inboxSelected.has(m.id) ? ' checked' : '';
    var sel = inboxSelected.has(m.id) ? ' selected' : '';
    var tags = '';
    if (m.tags && m.tags.length) {
      tags = '<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">';
      for (var t = 0; t < m.tags.length && t < 5; t++) {
        tags += '<span style="font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,0.04);color:#555">' + inboxEsc(m.tags[t]) + '</span>';
      }
      tags += '</div>';
    }
    html += '<div class="inbox-card' + sel + '" data-id="' + m.id + '">' +
      '<div class="inbox-card-header">' +
        '<input type="checkbox" onchange="inboxToggleSelect(' + m.id + ')"' + checked + '>' +
        '<span class="inbox-card-meta">#' + m.id + ' &middot; ' + inboxEsc(m.source || 'unknown') + ' &middot; ' + inboxTimeAgo(m.created_at) + '</span>' +
        '<span class="inbox-card-cat" style="background:' + cc.bg + ';color:' + cc.color + '">' + inboxEsc(m.category) + '</span>' +
      '</div>' +
      '<div class="inbox-card-content" onclick="this.classList.toggle(&quot;expanded&quot;)">' + inboxEsc(m.content) + '</div>' +
      tags +
      '<div class="inbox-card-actions">' +
        '<button class="inbox-btn approve" onclick="inboxApprove(' + m.id + ')">&#10003; Approve</button>' +
        '<button class="inbox-btn edit" onclick="inboxEdit(' + m.id + ')">&#9998; Edit</button>' +
        '<button class="inbox-btn reject" onclick="inboxReject(' + m.id + ')">&#10005; Reject</button>' +
      '</div>' +
    '</div>';
  }
  container.innerHTML = html;
}

function inboxToggleSelect(id) {
  if (inboxSelected.has(id)) inboxSelected.delete(id);
  else inboxSelected.add(id);
  document.querySelectorAll('.inbox-card').forEach(function(c) {
    var cid = Number(c.dataset.id);
    c.classList.toggle('selected', inboxSelected.has(cid));
    var cb = c.querySelector('input[type="checkbox"]');
    if (cb) cb.checked = inboxSelected.has(cid);
  });
}

function inboxSelectAll() {
  var allSelected = inboxSelected.size === inboxItems.length;
  inboxSelected.clear();
  if (!allSelected) for (var i = 0; i < inboxItems.length; i++) inboxSelected.add(inboxItems[i].id);
  renderInbox();
}

async function inboxApprove(id) {
  try {
    await fetch('/inbox/' + id + '/approve', { method: 'POST' });
    inboxItems = inboxItems.filter(function(m) { return m.id !== id; });
    inboxSelected.delete(id);
    renderInbox();
    updateInboxBadge(inboxItems.length);
    inboxToast('Memory #' + id + ' approved', 'success');
  } catch (e) { inboxToast('Approve failed: ' + e.message, 'error'); }
}

async function inboxReject(id) {
  if (!confirm('Reject memory #' + id + '? It will be archived.')) return;
  try {
    await fetch('/inbox/' + id + '/reject', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason: 'Rejected from inbox review' })
    });
    inboxItems = inboxItems.filter(function(m) { return m.id !== id; });
    inboxSelected.delete(id);
    renderInbox();
    updateInboxBadge(inboxItems.length);
    inboxToast('Memory #' + id + ' rejected', 'info');
  } catch (e) { inboxToast('Reject failed: ' + e.message, 'error'); }
}

async function inboxEdit(id) {
  var mem = inboxItems.find(function(m) { return m.id === id; });
  if (!mem) return;
  var newContent = prompt('Edit memory content:', mem.content);
  if (newContent === null) return;
  if (!newContent.trim()) { inboxToast('Content cannot be empty', 'error'); return; }
  try {
    await fetch('/inbox/' + id + '/edit', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: newContent.trim() })
    });
    inboxItems = inboxItems.filter(function(m) { return m.id !== id; });
    inboxSelected.delete(id);
    renderInbox();
    updateInboxBadge(inboxItems.length);
    inboxToast('Memory #' + id + ' edited & approved', 'success');
  } catch (e) { inboxToast('Edit failed: ' + e.message, 'error'); }
}

async function inboxBulkApprove() {
  var ids = Array.from(inboxSelected);
  if (!ids.length) { inboxToast('No memories selected', 'info'); return; }
  try {
    await fetch('/inbox/bulk', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: ids, action: 'approve' })
    });
    inboxItems = inboxItems.filter(function(m) { return !inboxSelected.has(m.id); });
    inboxSelected.clear();
    renderInbox();
    updateInboxBadge(inboxItems.length);
    inboxToast(ids.length + ' memories approved', 'success');
  } catch (e) { inboxToast('Bulk approve failed: ' + e.message, 'error'); }
}

async function inboxBulkReject() {
  var ids = Array.from(inboxSelected);
  if (!ids.length) { inboxToast('No memories selected', 'info'); return; }
  if (!confirm('Reject ' + ids.length + ' memories?')) return;
  try {
    await fetch('/inbox/bulk', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: ids, action: 'reject' })
    });
    inboxItems = inboxItems.filter(function(m) { return !inboxSelected.has(m.id); });
    inboxSelected.clear();
    renderInbox();
    updateInboxBadge(inboxItems.length);
    inboxToast(ids.length + ' memories rejected', 'info');
  } catch (e) { inboxToast('Bulk reject failed: ' + e.message, 'error'); }
}

function inboxToast(msg, type) {
  var toast = document.createElement('div');
  var colors = { success: '#34d399', error: '#f87171', info: '#818cf8' };
  var c = colors[type] || colors.info;
  toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;' +
    'border-radius:10px;font-size:12px;font-family:Inter,sans-serif;z-index:9999;' +
    'background:rgba(15,20,25,0.95);border:1px solid ' + c + '30;color:' + c + ';' +
    'backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.4);transition:opacity 0.3s';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() { toast.style.opacity = '0'; }, 2500);
  setTimeout(function() { toast.remove(); }, 3000);
}

// Keyboard shortcut: I to toggle inbox
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'i' || e.key === 'I') { e.preventDefault(); toggleInboxPanel(); }
});

setInterval(async function() {
  try { var r = await fetch('/inbox?limit=1'); var d = await r.json(); updateInboxBadge(d.total||0); } catch(e){}
}, 30000);
