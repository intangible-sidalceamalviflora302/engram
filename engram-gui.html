<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Engram</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@pixi/unsafe-eval@7.3.2/dist/unsafe-eval.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-filters@4.2.0/dist/pixi-filters.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #070a0f; color: #c8ccd4; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
  canvas { position: fixed; top: 0; left: 0; display: block; }

  .glass {
    background: rgba(15, 20, 25, 0.55);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; gap: 16px; padding: 10px 20px;
    background: rgba(15,20,25,0.75);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }
  #topbar h1 {
    font-size: 15px; font-weight: 700; color: #e2e4e9;
    letter-spacing: 1.5px; white-space: nowrap; text-transform: uppercase;
  }
  #topbar h1 span {
    background: linear-gradient(135deg, #7b8fff 0%, #b28dff 50%, #c084fc 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-glow { display: inline-block; filter: drop-shadow(0 0 8px rgba(129,140,248,0.3)); }
  #search-box { flex: 1; max-width: 380px; position: relative; }
  #search-box input {
    width: 100%; padding: 8px 14px 8px 34px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; color: #e2e4e9; font-size: 12px;
    font-family: 'Inter', sans-serif; outline: none;
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  #search-box input:focus {
    border-color: rgba(129,140,248,0.5);
    background: rgba(255,255,255,0.07);
    box-shadow: 0 0 24px rgba(129,140,248,0.12), 0 0 60px rgba(129,140,248,0.04);
  }
  #search-box input::placeholder { color: #3a3a50; }
  #search-box svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: 0.3; }
  .stats {
    display: flex; gap: 14px; margin-left: auto;
    font-size: 11px; color: #3a3a50;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px;
  }
  .stats .val {
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 500;
  }

  #sidebar {
    position: fixed; top: 0; right: -460px; width: 460px; height: 100vh; z-index: 20;
    background: rgba(15,20,25,0.92);
    backdrop-filter: blur(32px) saturate(1.6);
    -webkit-backdrop-filter: blur(32px) saturate(1.6);
    border-left: 1px solid rgba(255,255,255,0.05);
    box-shadow: -12px 0 60px rgba(0,0,0,0.5), inset 1px 0 0 rgba(255,255,255,0.03);
    transition: right 0.5s cubic-bezier(0.16,1,0.3,1);
    overflow-y: auto; padding: 28px;
  }
  #sidebar.open { right: 0; }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
  .close-btn {
    position: absolute; top: 16px; right: 16px; width: 30px; height: 30px;
    border-radius: 10px; border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03); color: #555; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .close-btn:hover { background: rgba(255,255,255,0.08); color: #aaa; transform: rotate(90deg); }
  .mem-header { margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .mem-id {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px; letter-spacing: 0.5px;
  }
  .mem-category {
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
  }
  .mem-content {
    font-size: 12.5px; line-height: 1.8; color: #a0a4b0;
    margin: 16px 0; white-space: pre-wrap; word-break: break-word;
  }
  .mem-meta {
    display: grid; grid-template-columns: auto 1fr;
    gap: 6px 16px; font-size: 11px; margin-top: 16px;
    padding: 14px; border-radius: 10px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03);
  }
  .mem-meta .label { color: #3a3a50; font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  .mem-meta .value { color: #777; }
  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 9px; font-weight: 600; margin-left: 6px; letter-spacing: 0.5px;
  }
  .badge-static { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.1); }
  .badge-forgotten { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.1); }
  .badge-inference { background: rgba(168,85,247,0.1); color: #c084fc; border: 1px solid rgba(168,85,247,0.1); }
  .linked-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.04); }
  .linked-section h3 {
    font-size: 10px; color: #3a3a50; margin-bottom: 12px;
    font-weight: 500; text-transform: uppercase; letter-spacing: 1px;
  }
  .linked-item {
    padding: 10px 12px; margin-bottom: 4px; border-radius: 10px;
    background: rgba(255,255,255,0.02); cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1); border: 1px solid transparent;
  }
  .linked-item:hover {
    background: rgba(129,140,248,0.05); border-color: rgba(129,140,248,0.1);
    transform: translateX(2px);
  }
  .linked-item .link-type {
    font-size: 9px; font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .linked-item .link-preview { font-size: 11px; color: #555; margin-top: 4px; line-height: 1.5; }

  #tooltip {
    position: fixed; z-index: 30; pointer-events: none;
    background: rgba(15,20,25,0.92); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 12px 16px; max-width: 320px;
    opacity: 0; transition: opacity 0.25s;
    backdrop-filter: blur(16px) saturate(1.4);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(129,140,248,0.04);
  }
  #tooltip .tt-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #818cf8; }
  #tooltip .tt-cat { font-size: 9px; text-transform: uppercase; margin-left: 6px; font-weight: 600; letter-spacing: 0.5px; }
  #tooltip .tt-text { font-size: 11px; color: #777; margin-top: 6px; line-height: 1.55; }

  #loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 50;
    text-align: center;
  }
  .spinner {
    width: 32px; height: 32px; border: 2px solid rgba(129,140,248,0.1);
    border-top-color: #818cf8; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    box-shadow: 0 0 20px rgba(129,140,248,0.15);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .text { font-size: 12px; color: #3a3a50; letter-spacing: 0.5px; }

  /* ===== List Panel (Left) ===== */
  #list-toggle {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.04); color: #666; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1); flex-shrink: 0;
  }
  #list-toggle:hover { background: rgba(129,140,248,0.12); color: #818cf8; border-color: rgba(129,140,248,0.2); }
  #list-toggle.active { background: rgba(129,140,248,0.15); color: #818cf8; border-color: rgba(129,140,248,0.3); box-shadow: 0 0 16px rgba(129,140,248,0.1); }

  /* Inbox Panel */
  #inbox-panel {
    position: fixed; top: 56px; left: -460px; width: 440px; height: calc(100vh - 56px); z-index: 15;
    background: rgba(15,20,25,0.92);
    backdrop-filter: blur(32px) saturate(1.6);
    -webkit-backdrop-filter: blur(32px) saturate(1.6);
    border-right: 1px solid rgba(255,255,255,0.05);
    box-shadow: 12px 0 60px rgba(0,0,0,0.4);
    transition: left 0.5s cubic-bezier(0.16,1,0.3,1);
    overflow-y: auto; display: flex; flex-direction: column;
  }
  #inbox-panel.open { left: 0; }
  #inbox-panel::-webkit-scrollbar { width: 4px; }
  #inbox-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
  .inbox-header {
    padding: 16px 18px 12px; border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
  }
  .inbox-title {
    display: flex; align-items: center; gap: 10px;
  }
  .inbox-title h2 {
    font-size: 13px; font-weight: 600; color: #e2e4e9;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .inbox-count {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #f97316;
    background: rgba(249,115,22,0.1); padding: 2px 8px; border-radius: 6px;
    border: 1px solid rgba(249,115,22,0.15);
  }
  .inbox-actions {
    display: flex; gap: 6px;
  }
  .inbox-action-btn {
    padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03); color: #94a3b8; font-size: 10px;
    font-family: 'Inter', sans-serif; cursor: pointer; font-weight: 500;
    transition: all 0.2s;
  }
  .inbox-action-btn:hover { background: rgba(255,255,255,0.06); color: #e2e4e9; }
  .inbox-action-btn.approve-all { border-color: rgba(52,211,153,0.2); color: #34d399; }
  .inbox-action-btn.approve-all:hover { background: rgba(52,211,153,0.1); }
  .inbox-action-btn.reject-all { border-color: rgba(248,113,113,0.2); color: #f87171; }
  .inbox-action-btn.reject-all:hover { background: rgba(248,113,113,0.1); }
  .inbox-list { flex: 1; overflow-y: auto; padding: 8px; }
  .inbox-card {
    padding: 14px 16px; margin-bottom: 6px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.04);
    background: rgba(255,255,255,0.015);
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    position: relative;
  }
  .inbox-card:hover {
    background: rgba(255,255,255,0.035);
    border-color: rgba(255,255,255,0.08);
  }
  .inbox-card.selected {
    border-color: rgba(129,140,248,0.3);
    background: rgba(129,140,248,0.06);
  }
  .inbox-card-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .inbox-card-header input[type="checkbox"] {
    accent-color: #818cf8; width: 14px; height: 14px; cursor: pointer;
  }
  .inbox-card-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #3a3a50; letter-spacing: 0.3px;
  }
  .inbox-card-cat {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    margin-left: 6px;
  }
  .inbox-card-content {
    font-size: 12px; line-height: 1.6; color: #c8ccd4;
    max-height: 120px; overflow: hidden; margin-bottom: 10px;
    word-wrap: break-word;
  }
  .inbox-card-content.expanded { max-height: none; }
  .inbox-card-actions {
    display: flex; gap: 6px; align-items: center;
  }
  .inbox-btn {
    padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
    border: 1px solid transparent;
  }
  .inbox-btn.approve {
    background: rgba(52,211,153,0.1); color: #34d399; border-color: rgba(52,211,153,0.2);
  }
  .inbox-btn.approve:hover { background: rgba(52,211,153,0.2); }
  .inbox-btn.edit {
    background: rgba(129,140,248,0.1); color: #818cf8; border-color: rgba(129,140,248,0.2);
  }
  .inbox-btn.edit:hover { background: rgba(129,140,248,0.2); }
  .inbox-btn.reject {
    background: rgba(248,113,113,0.08); color: #f87171; border-color: rgba(248,113,113,0.15);
  }
  .inbox-btn.reject:hover { background: rgba(248,113,113,0.15); }
  .inbox-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 300px; color: #3a3a50; text-align: center;
  }
  .inbox-empty svg { margin-bottom: 12px; opacity: 0.3; }
  .inbox-empty p { font-size: 13px; }
  .inbox-empty small { font-size: 11px; color: #2a2a3a; margin-top: 4px; }
  #inbox-toggle.active {
    background: rgba(249,115,22,0.15); color: #f97316; border-color: rgba(249,115,22,0.3);
    box-shadow: 0 0 16px rgba(249,115,22,0.1);
  }

  #list-panel {
    position: fixed; top: 0; left: -420px; width: 420px; height: 100vh; z-index: 15;
    background: rgba(8,11,18,0.96);
    backdrop-filter: blur(40px) saturate(1.6);
    -webkit-backdrop-filter: blur(40px) saturate(1.6);
    border-right: 1px solid rgba(129,140,248,0.08);
    box-shadow: 12px 0 60px rgba(0,0,0,0.6), inset -1px 0 0 rgba(255,255,255,0.02);
    transition: left 0.5s cubic-bezier(0.16,1,0.3,1);
    display: flex; flex-direction: column;
  }
  #list-panel.open { left: 0; }

  .lp-header { padding: 16px 16px 0; flex-shrink: 0; }
  .lp-title {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-top: 50px;
  }
  .lp-title h2 {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .lp-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #3a3a50; }

  .lp-search { position: relative; margin-bottom: 12px; }
  .lp-search input {
    width: 100%; padding: 10px 38px 10px 36px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; color: #e2e4e9; font-size: 12px;
    font-family: 'Inter', sans-serif; outline: none;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .lp-search input:focus {
    border-color: rgba(129,140,248,0.5); background: rgba(255,255,255,0.06);
    box-shadow: 0 0 24px rgba(129,140,248,0.12);
  }
  .lp-search input::placeholder { color: #2a2a3a; }
  .lp-search .lp-search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.3; pointer-events: none;
  }
  .lp-search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    width: 20px; height: 20px; border-radius: 5px; border: none;
    background: rgba(255,255,255,0.06); color: #555; cursor: pointer;
    font-size: 12px; display: none; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .lp-search-clear.visible { display: flex; }
  .lp-search-clear:hover { background: rgba(255,255,255,0.12); color: #aaa; }

  .lp-filters { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .lp-chip {
    padding: 4px 10px; border-radius: 20px; font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); color: #444;
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1); user-select: none;
  }
  .lp-chip:hover { background: rgba(255,255,255,0.05); color: #777; }
  .lp-chip.active {
    border-color: var(--chip-color, rgba(129,140,248,0.4));
    background: var(--chip-bg, rgba(129,140,248,0.12));
    color: var(--chip-color, #818cf8);
    box-shadow: 0 0 14px var(--chip-glow, rgba(129,140,248,0.1));
  }
  .lp-chip .lp-chip-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }
  .lp-chip .lp-chip-count {
    font-size: 8px; opacity: 0.5; margin-left: 4px;
  }

  .lp-sort-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
    padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .lp-sort-label { font-size: 9px; color: #2a2a3a; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .lp-sort-btn {
    padding: 3px 8px; border-radius: 5px; font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.02);
    color: #3a3a50; transition: all 0.2s; font-family: 'JetBrains Mono', monospace;
  }
  .lp-sort-btn:hover { color: #777; background: rgba(255,255,255,0.04); }
  .lp-sort-btn.active { color: #818cf8; border-color: rgba(129,140,248,0.3); background: rgba(129,140,248,0.06); }

  .lp-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
  .lp-list::-webkit-scrollbar { width: 3px; }
  .lp-list::-webkit-scrollbar-track { background: transparent; }
  .lp-list::-webkit-scrollbar-thumb { background: rgba(129,140,248,0.15); border-radius: 3px; }
  .lp-list::-webkit-scrollbar-thumb:hover { background: rgba(129,140,248,0.3); }

  /* Supermemory-style cards */
  .lp-card {
    padding: 14px 16px; margin-bottom: 8px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(15,20,30,0.8) 0%, rgba(20,25,40,0.6) 100%);
    border: 1px solid rgba(255,255,255,0.04);
    cursor: pointer; transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
    position: relative; overflow: hidden;
  }
  .lp-card::before {
    content: ''; position: absolute; inset: 0; border-radius: 12px;
    background: radial-gradient(ellipse at 50% 0%, var(--card-glow, rgba(129,140,248,0.06)) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.35s;
  }
  .lp-card::after {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px;
    background: var(--card-accent, #818cf8); border-radius: 2px;
    opacity: 0; transition: opacity 0.3s;
  }
  .lp-card:hover {
    border-color: var(--card-border-hover, rgba(129,140,248,0.15));
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 20px var(--card-glow, rgba(129,140,248,0.04));
  }
  .lp-card:hover::before { opacity: 1; }
  .lp-card:hover::after { opacity: 0.8; }
  .lp-card.active-card {
    border-color: var(--card-accent, rgba(129,140,248,0.25));
    background: linear-gradient(135deg, rgba(20,25,40,0.9) 0%, rgba(25,30,50,0.7) 100%);
    box-shadow: 0 4px 24px var(--card-glow, rgba(129,140,248,0.08));
  }
  .lp-card.active-card::after { opacity: 1; }

  .lp-card-type {
    display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
  }
  .lp-card-type svg { opacity: 0.5; flex-shrink: 0; }
  .lp-card-type-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--card-accent, #818cf8);
  }
  .lp-card-id {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #333;
    margin-left: auto;
  }

  .lp-card-title {
    font-size: 12px; font-weight: 600; color: #d0d4dc; line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;

// ===== Helpers =====

// Hexagon path helper
function hexPath(g, cx, cy, r, flat) {
  g.beginPath();
  for (var i = 0; i < 6; i++) {
    var a = (Math.PI / 3) * i - (flat ? 0 : Math.PI / 6);
    var px = cx + r * Math.cos(a), py = cy + r * Math.sin(a);
    if (i === 0) g.moveTo(px, py); else g.lineTo(px, py);
  }
  g.closePath();
}

// ===== Layout Engine =====

// --- Community Detection ---
// Union-Find for connected components on high-similarity links within each category
function detectClusters(catMemIds, catLinks) {
  var parent = {}, rank = {};
  catMemIds.forEach(function(id) { parent[id] = id; rank[id] = 0; });
  function find(x) { while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; } return x; }
  function union(a, b) {
    var ra = find(a), rb = find(b);
    if (ra === rb) return;
    if (rank[ra] < rank[rb]) { var t = ra; ra = rb; rb = t; }
    parent[rb] = ra;
    if (rank[ra] === rank[rb]) rank[ra]++;
  }
  catLinks.forEach(function(l) { union(l.source, l.target); });
  // Group by root
  var groups = {};
  catMemIds.forEach(function(id) {
    var root = find(id);
    if (!groups[root]) groups[root] = [];
    groups[root].push(id);
  });
  return Object.values(groups);
}

function autoLabel(memIds) {
  // Pick highest-importance memory, extract first meaningful words
  var best = null, bestImp = -1;
  for (var i = 0; i < memIds.length; i++) {
    var m = nodeMap[memIds[i]];
    if (m && (m.importance || 0) > bestImp) { bestImp = m.importance || 0; best = m; }
  }
  if (!best) return 'cluster';
  var text = (best.content || '').replace(/\[.*?\]/g, '').replace(/[#*_`]/g, '').trim();
  // Extract first meaningful phrase — skip common prefixes
  text = text.replace(/^(Updated|Added|Fixed|Created|Deployed|Completed|Configured|Installed|Set up|Built)\s*/i, '');
  var words = text.split(/\s+/).slice(0, 5).join(' ');
  if (words.length > 35) words = words.slice(0, 32) + '…';
  return words || 'cluster';
}

function computeLayout() {
  var cx = screenW / 2, cy = screenH / 2;
  centerPos = { x: cx, y: cy };

  var catGroups = {};
  var catList = Object.keys(COLORS);
  catList.forEach(function(c) { catGroups[c] = []; });
  memories.forEach(function(m) {
    var cat = m.category || 'general';
    if (!catGroups[cat]) catGroups[cat] = [];
    catGroups[cat].push(m);
  });

  var activeCats = catList.filter(function(c) { return catGroups[c] && catGroups[c].length > 0; });

  // No nuclei -- organic force layout only

  // ===== d3-force positioning =====
  clusters = {};
  clusterPositions = {};
  clusterProcessOrder = [];
  memToCluster = {};
  nodePositions = {};

  // Build force simulation nodes -- one per memory
  // Seed positions using angular category sectors with jitter for initial separation
  var forceNodes = [];
  var fnMap = {};
  for (var i = 0; i < memories.length; i++) {
    var m = memories[i];
    var cat = m.category || 'general';
    var catIdx = activeCats.indexOf(cat);
    var sectorAngle = catIdx >= 0
      ? (catIdx / activeCats.length) * Math.PI * 2 - Math.PI / 2
      : Math.random() * Math.PI * 2;
    var spreadR = 120 + Math.random() * 200;
    var fn = {
      id: m.id,
      category: cat,
      importance: m.importance || 5,
      radius: nodeRadius(m),
      x: cx + Math.cos(sectorAngle + (Math.random() - 0.5) * 0.8) * spreadR,
      y: cy + Math.sin(sectorAngle + (Math.random() - 0.5) * 0.8) * spreadR
    };
    forceNodes.push(fn);
    fnMap[m.id] = fn;
  }

  // Build force links from actual similarity links
  var nodeIdSet = {};
  for (var i = 0; i < forceNodes.length; i++) nodeIdSet[forceNodes[i].id] = true;
  var forceLinks = [];
  for (var i = 0; i < links.length; i++) {
    var l = links[i];
    if (nodeIdSet[l.source] && nodeIdSet[l.target]) {
      forceLinks.push({ source: l.source, target: l.target, similarity: l.similarity || 0.5 });
    }
  }

  // Run d3-force simulation -- organic layout driven by links + repulsion
  var sim = d3.forceSimulation(forceNodes)
    .force('charge', d3.forceManyBody()
      .strength(function(d) { return -20 - d.radius * 4; })
      .distanceMax(500))
    .force('link', d3.forceLink(forceLinks)
      .id(function(d) { return d.id; })
      .distance(function(d) { return 35 + (1 - d.similarity) * 80; })
      .strength(function(d) { return 0.1 + d.similarity * 0.4; }))
    .force('collision', d3.forceCollide()
      .radius(function(d) { return d.radius * 2 + 2; })
      .strength(0.6))
    .force('center', d3.forceCenter(cx, cy).strength(0.02))
    .alphaDecay(0.02)
    .velocityDecay(0.35);

  // Quick warmup: 30 ticks for recognizable initial layout; remainder settles async in RAF
  sim.alpha(1);
  for (var t = 0; t < 30; t++) sim.tick();
  sim.stop();

  // Store simulation reference for live ticking
  if (typeof _forceSim !== 'undefined' && _forceSim) _forceSim.stop();
  _forceSim = sim;
  _forceNodes = forceNodes;
  _fnMap = fnMap;

  // ===== Cluster Detection (same as original) =====
  var clusterIdCounter = 1;

  activeCats.forEach(function(cat) {
    var mems = catGroups[cat];
    if (!mems || mems.length === 0) return;
    var col = COLORS[cat] || COLORS.general;

    var catIdSet = {};
    mems.forEach(function(m) { catIdSet[m.id] = true; });
    var catLinks = links.filter(function(l) {
      return catIdSet[l.source] && catIdSet[l.target] && (l.similarity || 0) >= CLUSTER_SIM_THRESHOLD;
    });

    var memIds = mems.map(function(m) { return m.id; });
    var groups = detectClusters(memIds, catLinks);

    var clusterGroups = [];
    var individualMems = [];
    groups.forEach(function(group) {
      if (group.length >= CLUSTER_THRESHOLD) {
        clusterGroups.push(group);
      } else {
        group.forEach(function(id) { individualMems.push(nodeMap[id]); });
      }
    });

    // Clusters: use centroid of force positions
    clusterGroups.sort(function(a, b) { return b.length - a.length; });
    clusterGroups.forEach(function(group) {
      var cid = 'c' + (clusterIdCounter++);
      var avgImp = 0, sumX = 0, sumY = 0;
      group.forEach(function(id) {
        avgImp += (nodeMap[id].importance || 5);
        var fn = fnMap[id];
        if (fn) { sumX += fn.x; sumY += fn.y; }
      });
      avgImp /= group.length;
      var clx = sumX / group.length;
      var cly = sumY / group.length;

      var label = autoLabel(group);
      clusters[cid] = {
        id: cid, cat: cat, label: label,
        memIds: group, importance: avgImp,
        expanded: !!expandedClusters[cid]
      };
      group.forEach(function(mid) { memToCluster[mid] = cid; });
      clusterPositions[cid] = { x: clx, y: cly };
      clusterProcessOrder.push(cid);

      // Place children if expanded
      if (clusters[cid].expanded) {
        group.forEach(function(mid) {
          var fn = fnMap[mid];
          if (fn) {
            nodePositions[mid] = { x: fn.x, y: fn.y, depth: 1 };
          }
        });
      }
    });

    // Individual nodes: use force positions directly
    individualMems.forEach(function(m) {
      var fn = fnMap[m.id];
      if (!fn) return;
      nodePositions[m.id] = { x: fn.x, y: fn.y, depth: 0 };
    });
  });

  initParticles();
}

function placeClusterChildren(cid, clx, cly, baseAngle, col, cat) {
  var cluster = clusters[cid];
  if (!cluster) return;
  var mems = cluster.memIds.map(function(id) { return nodeMap[id]; }).filter(Boolean);
  mems.sort(function(a, b) { return (b.importance || 0) - (a.importance || 0); });

  for (var ci = 0; ci < mems.length; ci++) {
    var m = mems[ci];
    var childAngle = baseAngle + GOLDEN_ANGLE * ci;
    var childDist = 25 + Math.sqrt(ci) * 14;
    var mx = clx + Math.cos(childAngle) * childDist;
    var my = cly + Math.sin(childAngle) * childDist;
    nodePositions[m.id] = { x: mx, y: my, depth: 1 };
  }
}

function placeChildren(parentId, px, py, parentAngle, parentDist, depth, col, cat, childrenOf) {
  var children = childrenOf[parentId];
  if (!children || children.length === 0) return;
  var spreadNarrow = Math.PI * 0.6 / Math.pow(1.5, depth);
  var childDist = 45 + 14 / (depth + 1);
  for (var ci = 0; ci < children.length; ci++) {
    var child = children[ci];
    var childAngle = children.length === 1
      ? parentAngle + Math.sin(child.id * 1.3) * 0.15
      : parentAngle - spreadNarrow / 2 + (ci / (children.length - 1)) * spreadNarrow;
    var cNoise = Math.sin(child.id * 4.3) * 5;
    var actualDist = childDist + cNoise;
    var cxp = px + Math.cos(childAngle) * actualDist;
    var cyp = py + Math.sin(childAngle) * actualDist;
    nodePositions[child.id] = { x: cxp, y: cyp, depth: depth };

    placeChildren(child.id, cxp, cyp, childAngle, actualDist, depth + 1, col, cat, childrenOf);
  }
}

function initParticles() {
  branchParticles = [];
  if (links.length === 0) return;
  var maxP = Math.min(links.length * 1.5, MAX_BRANCH_PARTICLES) | 0;
  for (var i = 0; i < maxP; i++) {
    branchParticles.push({
      linkIdx: Math.random() * links.length | 0,
      t: Math.random(),
      speed: 0.002 + Math.random() * 0.004,
      size: 0.6 + Math.random() * 0.8,
      alpha: 0.15 + Math.random() * 0.25
    });
  }
}

// ===== Animated Position Computation =====
function computeAnimatedPositions() {
  // Hub wobble
  centerAnimPos.x = centerPos.x + Math.sin(time * 0.15) * HUB_WOBBLE + Math.sin(time * 0.31) * HUB_WOBBLE * 0.5;
  centerAnimPos.y = centerPos.y + Math.cos(time * 0.19) * HUB_WOBBLE + Math.cos(time * 0.37) * HUB_WOBBLE * 0.5;

  // Node positions from live force simulation
  if (_fnMap) {
    var ids = Object.keys(_fnMap);
    for (var i = 0; i < ids.length; i++) {
      var fn = _fnMap[ids[i]];
      if (fn) nodeAnimPos[fn.id] = { x: fn.x, y: fn.y };
    }
  }

  // Cluster positions as centroid of member node positions
  var cids = Object.keys(clusters);
  for (var i = 0; i < cids.length; i++) {
    var cid = cids[i];
    var cluster = clusters[cid];
    if (!cluster) continue;
    var sx = 0, sy = 0, cnt = 0;
    for (var j = 0; j < cluster.memIds.length; j++) {
      var nap = nodeAnimPos[cluster.memIds[j]];
      if (nap) { sx += nap.x; sy += nap.y; cnt++; }
    }
    if (cnt > 0) {
      clusterAnimPos[cid] = { x: sx / cnt, y: sy / cnt };
    } else {
      var bp = clusterPositions[cid];
      clusterAnimPos[cid] = bp ? { x: bp.x, y: bp.y } : { x: centerAnimPos.x, y: centerAnimPos.y };
    }
  }
}

function getHighlightPath(memId) {
  // Return indices into links array where memId is source or target (1-hop neighbors)
  var path = [];
  for (var i = 0; i < links.length; i++) {
    if (links[i].source === memId || links[i].target === memId) {
      path.push(i);
    }
  }
  return path;
}

function clearScene() {
  var layers = [glowLayer, orbLayer, particleLayer, orbitLayer, sparkLayer];
  for (var l = 0; l < layers.length; l++) {
    var ch = layers[l].removeChildren();
    for (var i = 0; i < ch.length; i++) ch[i].destroy();
  }
  var texts = labelLayer.removeChildren();
  for (var i = 0; i < texts.length; i++) texts[i].destroy(true);
  curvesGfx.clear();
  overlayGfx.clear();
  pulseGfx.clear();
  nodeSprites = {};
  clusterSprites = {};
  hubGlow = null; hubOrb = null; hubLabel = null;
  orbitParts = [];
  pulseRings = [];
  nodeSparks = [];
  energyPulses = [];
  energyPulsePool = [];

function buildScene() {

  // Recompute highlight path
  hlSet = {}; hlIndexSet = {};

    for (var i = 0; i < hlIndices.length; i++) {

      hlSet[l.target] = true;

  });

  hubLabel.position.set(centerAnimPos.x, centerAnimPos.y + CENTER_HUB_R + 4);

    });
  }
  nextPulseTime['__hub'] = time + rng(1, 4);

  // ===== Cluster Constellation Orbs =====
  clusterSprites = {};
  var cids = Object.keys(clusters);
  for (var ci = 0; ci < cids.length; ci++) {
    var cid = cids[ci];
    var cluster = clusters[cid];
    var ap = clusterAnimPos[cid] || clusterPositions[cid];
    if (!ap) continue;
    var col = COLORS[cluster.cat] || COLORS.general;

    // Cluster glow — larger than individual nodes
    var cg = new PIXI.Sprite(glowTex);
    cg.anchor.set(0.5);
    cg.tint = col.hex;
    cg.blendMode = PIXI.BLEND_MODES.ADD;
    cg.position.set(ap.x, ap.y);
    glowLayer.addChild(cg);

    // Cluster orb -- bigger, uses count to scale
    var co = new PIXI.Sprite(orbTex);
    co.anchor.set(0.5);
    co.tint = col.hex;
    co.position.set(ap.x, ap.y);
    orbLayer.addChild(co);

    // Neon halo ring
    var cr = new PIXI.Sprite(ringTex);
    cr.anchor.set(0.5);
    cr.tint = col.hex;
    cr.blendMode = PIXI.BLEND_MODES.ADD;
    cr.position.set(ap.x, ap.y);
    orbLayer.addChild(cr);

    // Count badge label
    var badgeText = cluster.memIds.length + '';
    var badge = new PIXI.Text(badgeText, {
      fontFamily: 'JetBrains Mono, monospace', fontSize: 14, fontWeight: '700',
      fill: 0xffffff, stroke: col.hex, strokeThickness: 2
    });
    badge.anchor.set(0.5);
    badge.position.set(ap.x, ap.y);
    labelLayer.addChild(badge);

    // Cluster label
    var clLabel = new PIXI.Text(cluster.label, {
      fontFamily: 'Inter, sans-serif', fontSize: 11, fontWeight: '500',
      fill: col.hex, wordWrap: true, wordWrapWidth: 120
    });
    clLabel.anchor.set(0.5, 0);
    clLabel.position.set(ap.x, ap.y + 20);
    labelLayer.addChild(clLabel);

    clusterSprites[cid] = { glow: cg, orb: co, ring: cr, badge: badge, label: clLabel };
  }

  // ===== Memory Nodes =====
  for (var mi = 0; mi < memories.length; mi++) {
    var m = memories[mi];

    // Skip memories that are in a collapsed cluster
    var mCluster = memToCluster[m.id];
    if (mCluster && !clusters[mCluster].expanded) continue;

    var ap = nodeAnimPos[m.id] || nodePositions[m.id];
    if (!ap) continue;
    var col = COLORS[m.category] || COLORS.general;

    var mg = new PIXI.Sprite(glowTex);
    mg.anchor.set(0.5);
    mg.tint = col.hex;
    mg.blendMode = PIXI.BLEND_MODES.ADD;
    mg.position.set(ap.x, ap.y);
    glowLayer.addChild(mg);

    var mo = new PIXI.Sprite(orbTex);
    mo.anchor.set(0.5);
    mo.tint = col.hex;
    mo.position.set(ap.x, ap.y);
    orbLayer.addChild(mo);

    nodeSprites[m.id] = { glow: mg, orb: mo };
  }

  // ===== Branch Particle Sprites =====
  for (var pi = 0; pi < branchParticles.length; pi++) {
    var ps = new PIXI.Sprite(particleTex);
    ps.anchor.set(0.5);
    ps.blendMode = PIXI.BLEND_MODES.ADD;
    ps.visible = false;
    particleLayer.addChild(ps);
    branchParticles[pi].sprite = ps;
  }

  // ===== Energy Pulse Sprite Pool =====
  energyPulsePool = [];
  for (var i = 0; i < MAX_ENERGY_PULSES; i++) {
    var eps = new PIXI.Sprite(glowTex);
    eps.anchor.set(0.5);
    eps.blendMode = PIXI.BLEND_MODES.ADD;
    eps.visible = false;
    particleLayer.addChild(eps);
    energyPulsePool.push(eps);
  }
}

// ===== Update Functions =====

// Sky updates removed — void background
function updateStars() {}
function updateNebulaDrifts() {}
function updateDust() {}
function updateShootingStars() {}

function updateGrid() {
  gridGfx.clear();
}

// Direct data links — straight lines from similarity connections
function updateCurves(phaseTrunk, phaseBranch, dimEased) {
  curvesGfx.clear();
  var alpha = easeOutExpo(phaseBranch);
  if (alpha < 0.005) return;

  for (var i = 0; i < links.length; i++) {
    var l = links[i];
    var sp = nodeAnimPos[l.source] || clusterAnimPos[l.source];
    var tp = nodeAnimPos[l.target] || clusterAnimPos[l.target];
    if (!sp || !tp) continue;

    // Category filtering
    var srcMem = nodeMap[l.source], tgtMem = nodeMap[l.target];
    if (currentFilter !== 'all') {
      var srcCat = srcMem ? srcMem.category : null;
      var tgtCat = tgtMem ? tgtMem.category : null;
      if (srcCat !== currentFilter && tgtCat !== currentFilter) continue;
    }

    // Visibility: skip links to nodes inside collapsed clusters
    var srcCluster = memToCluster[l.source], tgtCluster = memToCluster[l.target];
    if (srcCluster && clusters[srcCluster] && !clusters[srcCluster].expanded) continue;
    if (tgtCluster && clusters[tgtCluster] && !clusters[tgtCluster].expanded) continue;

    // Alpha from similarity strength
    var sim = l.similarity || 0.5;
    var lA = alpha * (0.05 + sim * 0.25);

    // Highlight connected links
    var isHL = hlSet[l.source] && hlSet[l.target];
    if (selectedNode) {
      if (isHL) lA = 0.6;
      else if (hlSet[l.source] || hlSet[l.target]) lA *= 0.5;
      else lA *= (1 - dimEased * 0.88);
    }
    if (lA < 0.005) continue;

    var col = srcMem ? (COLORS[srcMem.category] || COLORS.general) : COLORS.general;

    // Fiber optic glow — wider faint line beneath
    if (isHL || sim > 0.6) {
      curvesGfx.lineStyle(2.0 / transform.k, col.hex, lA * 0.12);
      curvesGfx.moveTo(sp.x, sp.y);
      curvesGfx.lineTo(tp.x, tp.y);
    }

    // Core line — thin bright fiber
    var lineW = Math.max(0.3, 0.4 + sim * 0.4) / transform.k;
    curvesGfx.lineStyle(lineW, col.hex, Math.min(lA * 1.2, 0.35));
    curvesGfx.moveTo(sp.x, sp.y);
    curvesGfx.lineTo(tp.x, tp.y);

    // Endpoint dots
    if (lA > 0.05) {
      curvesGfx.lineStyle(0);
      curvesGfx.beginFill(col.hex, lA * 0.3);
      curvesGfx.drawCircle(tp.x, tp.y, 0.6 / transform.k);
      curvesGfx.endFill();
    }
  }
}

// Data packets traveling along direct links
function updateParticles(entryEased, dimEased) {
  for (var pi = 0; pi < branchParticles.length; pi++) {
    var bp = branchParticles[pi];
    var spr = bp.sprite;
    if (!spr) continue;

    bp.t += bp.speed;
    if (bp.t > 1) {
      bp.t -= 1;
      bp.linkIdx = Math.random() * links.length | 0;
    }

    var l = links[bp.linkIdx];
    if (!l) { spr.visible = false; continue; }

    var sp = nodeAnimPos[l.source] || clusterAnimPos[l.source];
    var tp = nodeAnimPos[l.target] || clusterAnimPos[l.target];
    if (!sp || !tp) { spr.visible = false; continue; }

    var srcMem = nodeMap[l.source];
    if (currentFilter !== 'all' && srcMem && srcMem.category !== currentFilter) { spr.visible = false; continue; }

    // Linear interpolation along straight link
    var x = sp.x + (tp.x - sp.x) * bp.t;
    var y = sp.y + (tp.y - sp.y) * bp.t;
    var fadeT = Math.min(bp.t, 1 - bp.t) * 4;
    var pAlpha = bp.alpha * Math.min(1, fadeT) * entryEased;
    if (selectedNode && srcMem && srcMem.category !== selectedNode.category) pAlpha *= 0.08;
    if (pAlpha < 0.02) { spr.visible = false; continue; }

    spr.visible = true;
    spr.position.set(x, y);
    spr.tint = srcMem ? (COLORS[srcMem.category] || COLORS.general).hex : COLORS.general.hex;
    var pScale = bp.size * 2 / 32;
    spr.scale.set(pScale / transform.k);
    spr.alpha = pAlpha;
  }
}

// Energy pulses — bright data packets traveling along direct links
function updateEnergyPulses(dt, entryEased, dimEased) {
  // Spawn
  if (entryEased > 0.8 && links.length > 0 && energyPulses.length < MAX_ENERGY_PULSES) {
    for (var attempt = 0; attempt < 2; attempt++) {
      if (Math.random() < 0.12 * dt * 60) {
        var idx = Math.random() * links.length | 0;
        var l = links[idx];
        if (!l) continue;
        var srcMem = nodeMap[l.source];
        if (currentFilter !== 'all' && srcMem && srcMem.category !== currentFilter) continue;
        var freeSpr = null;
        for (var j = 0; j < energyPulsePool.length; j++) {
          if (!energyPulsePool[j].visible) { freeSpr = energyPulsePool[j]; break; }
        }
        if (!freeSpr) break;
        energyPulses.push({
          linkIdx: idx,
          t: 0, speed: 0.4 + Math.random() * 0.5,
          sprite: freeSpr, cat: srcMem ? srcMem.category : 'general'
        });
      }
    }
  }

  // Update
  for (var i = energyPulses.length - 1; i >= 0; i--) {
    var ep = energyPulses[i];
    ep.t += ep.speed * dt;
    if (ep.t >= 1) { ep.sprite.visible = false; energyPulses.splice(i, 1); continue; }

    var l = links[ep.linkIdx];
    if (!l) { ep.sprite.visible = false; energyPulses.splice(i, 1); continue; }

    var sp = nodeAnimPos[l.source] || clusterAnimPos[l.source];
    var tp = nodeAnimPos[l.target] || clusterAnimPos[l.target];
    if (!sp || !tp) { ep.sprite.visible = false; energyPulses.splice(i, 1); continue; }

    // Linear interpolation
    var x = sp.x + (tp.x - sp.x) * ep.t;
    var y = sp.y + (tp.y - sp.y) * ep.t;

    var fadeT = Math.min(ep.t * 5, (1 - ep.t) * 5, 1);
    var alpha = fadeT * 0.55 * entryEased;
    if (selectedNode && ep.cat !== selectedNode.category) alpha *= 0.1;

    ep.sprite.visible = alpha > 0.02;
    ep.sprite.position.set(x, y);
    ep.sprite.tint = (COLORS[ep.cat] || COLORS.general).hex;
    ep.sprite.scale.set((0.06 + alpha * 0.03) / transform.k);
    ep.sprite.alpha = alpha;
  }
}

// Pulse rings using animated positions -- hub only (nuclei removed)
function updatePulseRings(entryEased, dimEased) {
  if (nextPulseTime['__hub'] && time > nextPulseTime['__hub'] && pulseRings.length < MAX_PULSE_RINGS) {
    pulseRings.push({
      x: centerAnimPos.x, y: centerAnimPos.y,
      startR: CENTER_HUB_R,
      maxR: CENTER_HUB_R + 70 + Math.random() * 50,
      duration: 2.2 + Math.random() * 1.0,
      born: time, color: 0xa78bfa, cat: '__hub'
    });
    nextPulseTime['__hub'] = time + rng(3.5, 6);
  }

  pulseGfx.clear();
  for (var i = pulseRings.length - 1; i >= 0; i--) {
    var ring = pulseRings[i];
    var age = time - ring.born;
    var progress = age / ring.duration;
    if (progress >= 1) { pulseRings.splice(i, 1); continue; }
    var r = ring.startR + (ring.maxR - ring.startR) * easeOutCubic(progress);
    var alpha = (1 - progress * progress) * 0.3 * entryEased;
    if (selectedNode && ring.cat !== selectedNode.category && ring.cat !== '__hub') {
      alpha *= (1 - dimEased * 0.85);
    }
    if (alpha < 0.004) continue;
    pulseGfx.lineStyle(1.5 / transform.k, ring.color, alpha * 0.2);
    pulseGfx.drawCircle(ring.x, ring.y, r);
    pulseGfx.lineStyle(0.6 / transform.k, ring.color, alpha * 0.8);
    pulseGfx.drawCircle(ring.x, ring.y, r);
  }
}

// Orbit particles -- follow animated centers (hub only, nuclei removed)
function updateOrbitParticles(dt, entryEased, dimEased) {
  for (var i = 0; i < orbitParts.length; i++) {
    var op = orbitParts[i];
    var spr = op.sprite;

    // Update orbit center to animated position (hub only)
    if (op.isHub) {
      op.cx = centerAnimPos.x;
      op.cy = centerAnimPos.y;
    }

    if (op.cat && currentFilter !== 'all' && op.cat !== currentFilter) { spr.visible = false; continue; }

    op.angle += op.speed * dt;
    var ca = Math.cos(op.angle), sa = Math.sin(op.angle);
    var ct = Math.cos(op.tilt), st = Math.sin(op.tilt);
    var lx = ca * op.radiusX, ly = sa * op.radiusY;
    var wx = lx * ct - ly * st + op.cx;
    var wy = lx * st + ly * ct + op.cy;

    spr.position.set(wx, wy);
    var s = op.size * 2 / 32;
    spr.scale.set(s);
    var alpha = op.alpha * entryEased;
    alpha *= 0.5 + 0.5 * Math.sin(op.angle + 0.5);
    if (selectedNode) {
      if (!op.isHub && op.cat !== selectedNode.category) alpha *= (1 - dimEased * 0.85);
    }
    spr.alpha = alpha;
    spr.visible = alpha > 0.008;
  }
}

// Node sparks — emit from animated positions
function updateNodeSparks(dt, entryEased, dimEased) {
  if (entryEased > 0.8 && nodeSparks.length < MAX_NODE_SPARKS) {
    for (var mi = 0; mi < memories.length; mi++) {
      var m = memories[mi];
      if (!nodeVisible(m)) continue;
      var ap = nodeAnimPos[m.id];
      if (!ap) continue;
      var chance = NODE_SPARK_CHANCE * ((m.importance || 1) / 5);
      if (Math.random() > chance) continue;
      if (nodeSparks.length >= MAX_NODE_SPARKS) break;

      var col = COLORS[m.category] || COLORS.general;
      var angle = Math.random() * Math.PI * 2;
      var speed = 8 + Math.random() * 20;
      var spr = new PIXI.Sprite(sparkTex);
      spr.anchor.set(0.5);
      spr.blendMode = PIXI.BLEND_MODES.ADD;
      spr.tint = col.hex;
      sparkLayer.addChild(spr);

      nodeSparks.push({
        x: ap.x, y: ap.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.6 + Math.random() * 1.0,
        maxLife: 0.6 + Math.random() * 1.0,
        size: 0.5 + Math.random() * 1.0,
        sprite: spr, cat: m.category
      });
    }
  }

  for (var i = nodeSparks.length - 1; i >= 0; i--) {
    var sp = nodeSparks[i];
    sp.life -= dt;
    if (sp.life <= 0) {
      sp.sprite.destroy();
      nodeSparks.splice(i, 1);
      continue;
    }
    sp.x += sp.vx * dt;
    sp.y += sp.vy * dt;
    sp.vx *= 0.97;
    sp.vy *= 0.97;
    var lifeRatio = sp.life / sp.maxLife;
    var alpha = lifeRatio * lifeRatio * 0.7 * entryEased;
    if (selectedNode && sp.cat !== selectedNode.category) alpha *= (1 - dimEased * 0.85);
    sp.sprite.position.set(sp.x, sp.y);
    sp.sprite.scale.set(sp.size * lifeRatio * 2 / 16);
    sp.sprite.alpha = alpha;
    sp.sprite.visible = alpha > 0.01;
  }
}

// Center hub — animated position + rotation
function updateHub(phaseCenter) {
  if (!hubGlow || !hubOrb) return;
  var alpha = easeOutExpo(phaseCenter);
  var pulse = 1
    + Math.sin(time * 0.8) * 0.08
    + Math.sin(time * 1.7) * 0.04
    + Math.sin(time * 3.1) * 0.02;
  var r = CENTER_HUB_R * pulse;

  var glowBreath = 1 + Math.sin(time * 0.5) * 0.22 + Math.sin(time * 1.3) * 0.08;
  var glowDiam = r * 2.5;
  hubGlow.position.set(centerAnimPos.x, centerAnimPos.y);
  hubGlow.scale.set(glowDiam / 128);
  hubGlow.alpha = alpha * 0.12 * glowBreath;

  var orbDiam = r * 2.8;
  hubOrb.position.set(centerAnimPos.x, centerAnimPos.y);
  hubOrb.scale.set(orbDiam / 128);
  hubOrb.alpha = alpha;
  hubOrb.rotation = 0;

  if (hubLabel) {
    hubLabel.visible = transform.k > 0.4;
    hubLabel.scale.set(0.5 / transform.k);
    hubLabel.alpha = 0.5 * alpha;
    hubLabel.position.set(centerAnimPos.x, centerAnimPos.y + r + 18 / transform.k);
  }
}

// Category nuclei removed — organic force layout

// Cluster constellation orbs — animated positions + count badges
function updateClusters(phaseNodes, dimEased) {
  var cids = Object.keys(clusterSprites);
  for (var ci = 0; ci < cids.length; ci++) {
    var cid = cids[ci];
    var cluster = clusters[cid];
    var cs = clusterSprites[cid];
    if (!cs || !cluster) continue;

    var vis = currentFilter === 'all' || cluster.cat === currentFilter;
    // Hide cluster orb if expanded (children are shown instead)
    if (cluster.expanded) vis = false;

    cs.glow.visible = vis;
    cs.orb.visible = vis;
    cs.ring.visible = vis;
    cs.badge.visible = vis && transform.k > 0.15;
    cs.label.visible = vis && transform.k > 0.3;
    if (!vis) continue;

    var ap = clusterAnimPos[cid];
    if (!ap) { cs.glow.visible = false; cs.orb.visible = false; cs.ring.visible = false; cs.badge.visible = false; cs.label.visible = false; continue; }

    // Cluster radius based on member count — bigger clusters = bigger orbs
    var count = cluster.memIds.length;
    var baseR = 3.5 + Math.sqrt(count) * 1.5 + Math.log2(count + 1) * 0.8;

    var alpha = phaseNodes;
    if (dimProgress > 0) alpha *= (1 - dimEased * 0.6);

    // Breathing
    var pulse = 1 + Math.sin(time * 0.8 + ci * 1.7) * 0.08 + Math.sin(time * 2.1 + ci * 0.9) * 0.04;
    var pr = baseR * pulse;

    // Glow
    var glowBreath = 1 + Math.sin(time * 0.5 + ci * 1.3) * 0.2;
    var glowDiam = pr * 3.0 * 2;
    cs.glow.position.set(ap.x, ap.y);
    cs.glow.scale.set(glowDiam / 128);
    cs.glow.alpha = alpha * 0.18 * glowBreath;

    // Orb
    var orbDiam = pr * 3.6;
    cs.orb.position.set(ap.x, ap.y);
    cs.orb.scale.set(orbDiam / 128);
    cs.orb.alpha = Math.min(1, alpha * 1.2);
    cs.orb.rotation = 0;

    // Neon halo ring
    cs.ring.position.set(ap.x, ap.y);
    var ringScale = pr * 3.4 / 64;
    cs.ring.scale.set(ringScale);
    cs.ring.alpha = alpha * 0.25;
    cs.ring.visible = vis && transform.k > 0.15;

    // Badge (count number)
    cs.badge.position.set(ap.x, ap.y);
    cs.badge.scale.set(0.7 / transform.k);
    cs.badge.alpha = alpha * 0.9;

    // Label
    var labelY = ap.y + pr * 3.8 / transform.k * 0.3 + 8 / transform.k;
    cs.label.position.set(ap.x, labelY);
    cs.label.scale.set(0.45 / transform.k);
    cs.label.alpha = alpha * 0.55;
  }
}

// Memory nodes — animated glow + orb
function updateNodes(phaseNodes, dimEased) {
  for (var mi = 0; mi < memories.length; mi++) {
    var m = memories[mi];
    var ns = nodeSprites[m.id];
    if (!ns) continue;

    var vis = nodeVisible(m);
    ns.glow.visible = vis;
    ns.orb.visible = vis;
    if (!vis) continue;

    var ap = nodeAnimPos[m.id];
    if (!ap) { ns.glow.visible = false; ns.orb.visible = false; continue; }

    var r = nodeRadius(m);
    var isSelected = selectedNode && selectedNode.id === m.id;
    var isHovered = hoveredNode && hoveredNode.id === m.id;
    var isSearchHit = searchHighlight.has(m.id);
    var isOnPath = hlSet[m.id] || false;

    var nodeDelay = (mi / memories.length) * 0.3;
    var nodeEntry = Math.min(1, easeOutExpo(Math.max(0, phaseNodes * 1.5 - nodeDelay)));
    var nodeScale = 0.3 + nodeEntry * 0.7;

    var alpha = nodeEntry;
    if (selectedNode && !isSelected && !isOnPath) alpha *= (1 - dimEased * 0.88);
    if (m.is_forgotten) alpha *= 0.25;
    if (alpha < 0.01) { ns.glow.visible = false; ns.orb.visible = false; continue; }

    // Compound breathing
    var pulse = 1
      + Math.sin(time * 1.1 + m.id * 0.7) * 0.06
      + Math.sin(time * 2.7 + m.id * 1.3) * 0.03
      + Math.sin(time * 4.3 + m.id * 2.1) * 0.015;
    var pr = r * nodeScale * pulse;

    // Glow
    var glowBreath = 1 + Math.sin(time * 0.7 + m.id * 1.1) * 0.18 + Math.sin(time * 2.1 + m.id * 0.5) * 0.08;
    var bloomMult = (isSelected || isHovered || isSearchHit) ? 2.5 : 1.5;
    var glowDiam = pr * bloomMult * 2;
    ns.glow.position.set(ap.x, ap.y);
    ns.glow.scale.set(glowDiam / 128);
    ns.glow.alpha = alpha * (isSelected || isHovered ? 0.3 : 0.12) * glowBreath;
    ns.glow.visible = true;

    // Orb (hex — no rotation)
    var orbDiam = pr * 3.2;
    ns.orb.position.set(ap.x, ap.y);
    ns.orb.scale.set(orbDiam / 128);
    ns.orb.alpha = Math.min(1, alpha * 1.3);
    ns.orb.rotation = 0;
    ns.orb.visible = true;
  }
}

// Draw a flat-top hex outline on a PIXI.Graphics object.
// cx/cy = center, R = circumradius, gfx = PIXI.Graphics instance.
function drawHexOutline(gfx, cx, cy, R) {
  for (var i = 0; i < 6; i++) {
    var angle = (Math.PI / 3) * i; // flat-top: 0, 60, 120 ...
    var px = cx + R * Math.cos(angle);
    var py = cy + R * Math.sin(angle);
    if (i === 0) gfx.moveTo(px, py); else gfx.lineTo(px, py);
  }
  gfx.closePath();
}

function updateOverlay() {
  overlayGfx.clear();

  if (transform.k > 1.5) {
    var now = Date.now();
    var oneDayAgo = now - 86400000;
    for (var mi = 0; mi < memories.length; mi++) {
      var m = memories[mi];
      if (!nodeVisible(m)) continue;
      var ap = nodeAnimPos[m.id];
      if (!ap) continue;
      var r = nodeRadius(m);
      var col = COLORS[m.category] || COLORS.general;

      // Forgotten: X cross
      if (m.is_forgotten) {
        var cs = r * 0.5;
        overlayGfx.lineStyle(1.5 / transform.k, 0xef4444, 0.6);
        overlayGfx.moveTo(ap.x - cs, ap.y - cs); overlayGfx.lineTo(ap.x + cs, ap.y + cs);
        overlayGfx.moveTo(ap.x + cs, ap.y - cs); overlayGfx.lineTo(ap.x - cs, ap.y + cs);
      }

      // New (< 24h): small dot at top-right corner of hex
      var createdAt = m.created_at ? new Date(m.created_at).getTime() : 0;
      if (createdAt > oneDayAgo) {
        overlayGfx.lineStyle(0); overlayGfx.beginFill(0x22c55e, 0.8);
        overlayGfx.drawCircle(ap.x + r * 0.75, ap.y - r * 0.55, 2.5 / transform.k);
        overlayGfx.endFill();
      }

      // Expiring soon: pulsing hex outline
      if (m.forget_after) {
        var expiresAt = new Date(m.forget_after).getTime();
        var hoursLeft = (expiresAt - now) / 3600000;
        if (hoursLeft > 0 && hoursLeft < 48) {
          overlayGfx.lineStyle(1 / transform.k, 0xfbbf24, 0.4 + Math.sin(time * 2) * 0.15);
          drawHexOutline(overlayGfx, ap.x, ap.y, r + 2 / transform.k);
        }
      }

      // Static memory: faint hex border
      if (m.is_static) {
        overlayGfx.lineStyle(0.8 / transform.k, col.hex, 0.2);
        drawHexOutline(overlayGfx, ap.x, ap.y, r + 4 / transform.k);
      }
    }
  }

  // Selected hex ring — double outline with pulse
  if (selectedNode) {
    var ap = nodeAnimPos[selectedNode.id];
    if (ap) {
      var r = nodeRadius(selectedNode);
      var pulse = 1 + Math.sin(time * 1.1 + selectedNode.id * 0.7) * 0.06;
      var pr = r * pulse;
      var selPulse = Math.sin(time * 3) * 0.5 + 0.5;
      var selR = pr + (5 + selPulse * 3) / transform.k;
      var col = COLORS[selectedNode.category] || COLORS.general;
      overlayGfx.lineStyle(3 / transform.k, col.hex, 0.1 + selPulse * 0.08);
      drawHexOutline(overlayGfx, ap.x, ap.y, selR + 2 / transform.k);
      overlayGfx.lineStyle(1.2 / transform.k, col.hex, 0.3 + selPulse * 0.25);
      drawHexOutline(overlayGfx, ap.x, ap.y, selR);
    }
  }

  // Hover hex ring
  if (hoveredNode && (!selectedNode || hoveredNode.id !== selectedNode.id)) {
    var ap = nodeAnimPos[hoveredNode.id];
    if (ap) {
      var r = nodeRadius(hoveredNode);
      var col = COLORS[hoveredNode.category] || COLORS.general;
      overlayGfx.lineStyle(0.8 / transform.k, col.hex, 0.35);
      drawHexOutline(overlayGfx, ap.x, ap.y, r + 4 / transform.k);
    }
  }
}

// ===== Main Ticker =====
app.ticker.add(function() {
  time = performance.now() * 0.001;
  var dt = app.ticker.deltaMS / 1000;

  // Entry animation
  if (entryProgress < 1 && loadTime > 0) {
    entryProgress = Math.min(1, (performance.now() - loadTime) / 2500);
  }

  // Dim animation
  dimTarget = selectedNode ? 1 : 0;
  if (dimProgress < dimTarget) dimProgress = Math.min(dimTarget, dimProgress + dt / 1.5);
  else if (dimProgress > dimTarget) dimProgress = Math.max(dimTarget, dimProgress - dt / 0.5);
  var dimEased = easeOutCubic(dimProgress);

  // Entry phases
  var phaseCenter = clamp01(entryProgress / 0.15);
  var phaseTrunk = clamp01((entryProgress - 0.12) / 0.23);
  var phaseBranch = clamp01((entryProgress - 0.45) / 0.3);
  var phaseNodes = clamp01((entryProgress - 0.6) / 0.4);
  var entryEased = easeOutExpo(entryProgress);

  // Compute animated positions for this frame
  computeAnimatedPositions();

  // Async force-sim settling: run ticks up to 8ms budget, override nodeAnimPos from live positions
  if (_simSettling && _forceSim && _fnMap) {
    var _t0 = performance.now();
    while (performance.now() - _t0 < 8 && _forceSim.alpha() > 0.01) {
      _forceSim.tick();
    }
    var _ids = Object.keys(_fnMap);
    for (var _si = 0; _si < _ids.length; _si++) {
      var _fn = _fnMap[_ids[_si]];
      if (_fn) nodeAnimPos[_fn.id] = { x: _fn.x, y: _fn.y };
    }
    if (_forceSim.alpha() <= 0.01) {
      _simSettling = false;
      computeLayout();
      computeAnimatedPositions();
      buildScene();
    }
  }

  // Screen-space effects
  updateStars();
  updateNebulaDrifts(dt);
  updateDust(dt);
  updateShootingStars(dt);

  // World-space effects
  updateGrid();
  updateCurves(phaseTrunk, phaseBranch, dimEased);
  updateParticles(entryEased, dimEased);
  updateEnergyPulses(dt, entryEased, dimEased);
  updatePulseRings(entryEased, dimEased);
  updateOrbitParticles(dt, entryEased, dimEased);
  updateNodeSparks(dt, entryEased, dimEased);
  updateHub(phaseCenter);
  updateClusters(phaseNodes, dimEased);
  updateNodes(phaseNodes, dimEased);
  updateOverlay();
});

var zoom = d3.zoom().scaleExtent([0.06, 18]).on('zoom', function(e) {

// ===== Interaction — uses animated positions =====
function screenToWorld(sx, sy) {
  return [(sx - transform.x) / transform.k, (sy - transform.y) / transform.k];
}

// Point-in-flat-top-hex test. cx/cy = center, R = circumradius.
function pointInHex(px, py, cx, cy, R) {
  var dx = px - cx, dy = py - cy;
  // Flat-top hex: width = 2R, height = sqrt(3)*R
  var hw = R, hh = R * 0.866025; // half-width, half-height
  if (Math.abs(dx) > hw || Math.abs(dy) > hh * 1.155) return false; // fast bbox reject
  // The two diagonal edges: |dx| + |dy| / 0.577 <= R  =>  |dx| * 0.577 + |dy| <= R * 0.577 * 1.155
  return (Math.abs(dx) * 0.57735 + Math.abs(dy)) <= R * 1.1547;
}

function findNode(sx, sy) {
  var wxy = screenToWorld(sx, sy), wx = wxy[0], wy = wxy[1];
  var closest = null, closestDist = Infinity;
  for (var i = 0; i < memories.length; i++) {
    var m = memories[i];
    if (!nodeVisible(m)) continue;
    // Skip memories in collapsed clusters
    var mCluster = memToCluster[m.id];
    if (mCluster && !clusters[mCluster].expanded) continue;
    var ap = nodeAnimPos[m.id];
    if (!ap) continue;
    var r = nodeRadius(m);
    var hitR = r + 8 / transform.k;
    if (!pointInHex(wx, wy, ap.x, ap.y, hitR)) continue;
    var dx = ap.x - wx, dy = ap.y - wy;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < closestDist) { closest = m; closestDist = dist; }
  }
  return closest;
}

function findCluster(sx, sy) {
  var wxy = screenToWorld(sx, sy), wx = wxy[0], wy = wxy[1];
  var cids = Object.keys(clusters);
  for (var i = 0; i < cids.length; i++) {
    var cid = cids[i];
    var cluster = clusters[cid];
    if (cluster.expanded) continue; // Don't hit expanded clusters
    if (currentFilter !== 'all' && cluster.cat !== currentFilter) continue;
    var ap = clusterAnimPos[cid];
    if (!ap) continue;
    var count = cluster.memIds.length;
    var hitR = (3.5 + Math.sqrt(count) * 1.5) * 3.6 / 128 * 128 + 12 / transform.k;
    // Simpler: use a generous hit radius based on count
    hitR = 8 + Math.sqrt(count) * 3 + 6 / transform.k;
    var dx = ap.x - wx, dy = ap.y - wy;
    if (Math.sqrt(dx * dx + dy * dy) < hitR) return cid;
  }
  return null;
}

function toggleCluster(cid) {
  if (expandedClusters[cid]) {
    delete expandedClusters[cid];
  } else {
    expandedClusters[cid] = true;
  }
  // Rebuild layout and scene with new expand state
  computeLayout();
  computeAnimatedPositions();
  buildScene();
  entryProgress = 1; // skip entry animation
  if (listPanelOpen) renderListPanel();
}

function hitCenterHub(sx, sy) {
  var wxy = screenToWorld(sx, sy);
  var dx = centerAnimPos.x - wxy[0], dy = centerAnimPos.y - wxy[1];
  return Math.sqrt(dx * dx + dy * dy) < CENTER_HUB_R + 8 / transform.k;
}

// ===== Mouse Events =====
app.view.addEventListener('mousemove', function(e) {
  var node = findNode(e.clientX, e.clientY);
  var clHit = !node ? findCluster(e.clientX, e.clientY) : null;
  if (node !== hoveredNode) {
    hoveredNode = node;
    var hubHit = !node && !clHit ? hitCenterHub(e.clientX, e.clientY) : false;
    app.view.style.cursor = (node || hubHit || clHit) ? 'pointer' : 'default';
    if (node) {
      showTooltip(node, e.clientX, e.clientY);
    } else if (clHit) {
      showClusterTooltip(clHit, e.clientX, e.clientY);
    } else {
      hideTooltip();
    }
  } else if (node) {
    showTooltip(node, e.clientX, e.clientY);
  } else if (clHit) {
    showClusterTooltip(clHit, e.clientX, e.clientY);
    app.view.style.cursor = 'pointer';
  }
});

app.view.addEventListener('click', function(e) {
  var node = findNode(e.clientX, e.clientY);
  if (node) { openSidebar(node); return; }
  var clusterHit = findCluster(e.clientX, e.clientY);
  if (clusterHit) { toggleCluster(clusterHit); return; }
  if (hitCenterHub(e.clientX, e.clientY)) { currentFilter = 'all'; closeSidebar(); return; }
});

// ===== Search =====
async function doSearch() {
  var q = document.getElementById('search').value.trim();
  if (!q) { searchHighlight.clear(); return; }
  try {
    var res = await fetch(BASE + '/search', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query: q, limit: 20 }) });
    var data = await res.json();
    searchHighlight = new Set((data.results || []).map(function(r) { return r.id; }));
    if (data.results && data.results.length > 0) {
      var first = nodeMap[data.results[0].id];
      if (first) { openSidebar(first); navigateTo(first.id); }
    }
  } catch(e) { console.error('Search failed:', e); }
}

// ===== Utility =====
function escHtml(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }
function formatDate(s) {
  if (!s) return '\u2014';
  try { return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
  catch(e) { return s; }
}
function shortDate(s) {
  if (!s) return '\u2014';
  try { return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
  catch(e) { return s; }
}
function memoryTitle(m) {
  var text = (m.content || '').trim();
  var firstLine = text.split('\n')[0].replace(/^#+\s*/, '').replace(/^\[.*?\]\s*/, '');
  if (firstLine.length > 80) firstLine = firstLine.slice(0, 77) + '...';
  return firstLine || 'Memory #' + m.id;
}
function memoryPreview(m) {
  var lines = (m.content || '').trim().split('\n');
  var preview = lines.slice(1).join(' ').replace(/\s+/g, ' ').trim();
  if (!preview && lines[0]) preview = lines[0].replace(/^#+\s*/, '');
  if (preview.length > 140) preview = preview.slice(0, 137) + '...';
  return preview;
}

function buildListFilters() {
  var container = document.getElementById('lp-filters');
  var cats = ['all', 'task', 'discovery', 'decision', 'state', 'issue'];
  var counts = {};
  memories.forEach(function(m) { counts[m.category] = (counts[m.category] || 0) + 1; });
  var html = '';
  cats.forEach(function(cat) {
    var isAll = cat === 'all';
    var col = COLORS[cat] || COLORS.general;
    var active = listFilter === cat ? ' active' : '';
    var count = isAll ? memories.length : (counts[cat] || 0);
    var style = '';
    if (!isAll) {
      style = ' style="--chip-color:' + col.core + ';--chip-bg:rgba(' + col.r + ',' + col.g + ',' + col.b + ',0.12);--chip-glow:rgba(' + col.r + ',' + col.g + ',' + col.b + ',0.1)"';
    }
    html += '<button class="lp-chip' + active + '"' + style + ' onclick="setListFilter(\'' + cat + '\')">';
    if (!isAll) html += '<span class="lp-chip-dot" style="background:' + col.core + ';box-shadow:0 0 6px ' + col.glow + '"></span>';
    html += (isAll ? 'All' : cat);
    html += '<span class="lp-chip-count">' + count + '</span>';
    html += '</button>';
  });

  // Source filter chips
  var sources = {};
  memories.forEach(function(m) { if (m.source) sources[m.source] = (sources[m.source] || 0) + 1; });
  var sourceKeys = Object.keys(sources).sort(function(a, b) { return sources[b] - sources[a]; });
  if (sourceKeys.length > 1) {
    html += '<div style="width:100%;height:1px;background:rgba(255,255,255,0.04);margin:6px 0"></div>';
    var srcActive = sourceFilter === 'all' ? ' active' : '';
    html += '<button class="lp-chip' + srcActive + '" onclick="setSourceFilter(\'all\')">All sources</button>';
    sourceKeys.forEach(function(src) {
      var srcAct = sourceFilter === src ? ' active' : '';
      var safeSrc = src.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      html += '<button class="lp-chip' + srcAct + '" style="--chip-color:#818cf8;--chip-bg:rgba(129,140,248,0.1)" onclick="setSourceFilter(\'' + safeSrc + '\')">';
      html += src + '<span class="lp-chip-count">' + sources[src] + '</span></button>';
    });
  }

  // Cluster summary
  var clusterCount = Object.keys(clusters).length;
  var expandedCount = Object.keys(expandedClusters).length;
  if (clusterCount > 0) {
    html += '<div style="width:100%;height:1px;background:rgba(255,255,255,0.04);margin:6px 0"></div>';
    html += '<div style="display:flex;gap:6px;align-items:center;width:100%">';
    html += '<span style="font-size:10px;color:#666;flex:1">⬡ ' + clusterCount + ' clusters';
    if (expandedCount > 0) html += ' (' + expandedCount + ' expanded)';
    html += '</span>';
    if (expandedCount > 0) {
      html += '<button class="lp-chip" onclick="collapseAll()" style="font-size:9px;padding:2px 8px">Collapse all</button>';
    }
    html += '</div>';
  }

  container.innerHTML = html;
}

  sourceFilter = src;
  buildListFilters();
  renderListItems();
}

function collapseAll() {
  expandedClusters = {};
  computeLayout();
  computeAnimatedPositions();
  buildScene();
  entryProgress = 1;
  buildListFilters();
  renderListItems();
}

function setListFilter(cat) {
  listFilter = cat;
  buildListFilters();
  renderListItems();
}

function setListSort(sort) {
  listSort = sort;
  document.querySelectorAll('.lp-sort-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.sort === sort);
  });
  renderListItems();
}

function getFilteredMemories() {
  var source;
  if (listSearchResults) {
    source = listSearchResults.map(function(r) { return nodeMap[r.id]; }).filter(Boolean);
  } else {
    source = memories.slice();
  }
  if (listFilter !== 'all') {
    source = source.filter(function(m) { return m.category === listFilter; });
  }
  if (sourceFilter !== 'all') {
    source = source.filter(function(m) { return (m.source || '') === sourceFilter; });
  }
  if (listSearchQuery && !listSearchResults) {
    var q = listSearchQuery.toLowerCase();
    source = source.filter(function(m) {
      return (m.content || '').toLowerCase().indexOf(q) !== -1 ||
             (m.category || '').toLowerCase().indexOf(q) !== -1 ||
             String(m.id).indexOf(q) !== -1;
    });
  }
  // Sort
  if (listSort === 'newest') {
    source.sort(function(a, b) { return (b.created_at || '').localeCompare(a.created_at || ''); });
  } else if (listSort === 'oldest') {
    source.sort(function(a, b) { return (a.created_at || '').localeCompare(b.created_at || ''); });
  } else if (listSort === 'importance') {
    source.sort(function(a, b) { return (b.importance || 0) - (a.importance || 0); });
  } else if (listSort === 'id') {
    source.sort(function(a, b) { return b.id - a.id; });
  }
  return source;
}

    else if (m.category === 'decision') typeIcon += '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>';
    else if (m.category === 'state') typeIcon += '<rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>';
    else if (m.category === 'issue') typeIcon += '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>';
    else typeIcon += '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>';
    typeIcon += '</svg>';

    // Importance stars (1-10 mapped to 1-5 stars)
    var impVal = m.importance || 1;
    var starCount = Math.ceil(impVal / 2);
    var starsHtml = '';
    for (var s = 0; s < 5; s++) {
      starsHtml += '<svg class="star' + (s < starCount ? '' : ' dim') + '" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
    }

    html += '<div class="lp-card' + active + '" data-id="' + m.id + '" onclick="listCardClick(' + m.id + ')" style="animation-delay:' + delay + 's;--card-accent:' + col.core + ';--card-glow:rgba(' + col.r + ',' + col.g + ',' + col.b + ',0.08);--card-border-hover:rgba(' + col.r + ',' + col.g + ',' + col.b + ',0.2)">';
    if (badges) html += '<div class="lp-card-badges">' + badges + '</div>';
    html += '<div class="lp-card-type">' + typeIcon + '<span class="lp-card-type-label">' + m.category + '</span><span class="lp-card-id">#' + m.id + '</span></div>';
    html += '<div class="lp-card-title">' + escHtml(memoryTitle(m)) + '</div>';
    html += '<div class="lp-card-preview">' + escHtml(memoryPreview(m)) + '</div>';
    html += '<div class="lp-card-footer"><div class="lp-card-imp">' + starsHtml + '<span class="lp-card-imp-num">' + impVal + '</span></div>';
    html += '<span class="lp-card-date">' + shortDate(m.created_at) + '</span></div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

// ===== Viewport Controls =====
function fitView() {
  if (memories.length === 0) return;
  var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  memories.forEach(function(m) {
    var p = nodeAnimPos[m.id] || nodePositions[m.id];
    if (p) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
  });
  var padding = 120;
  var dx = maxX - minX + padding * 2;
  var dy = maxY - minY + padding * 2;
  var cx = (minX + maxX) / 2;
  var cy = (minY + maxY) / 2;
  var scale = Math.min(screenW / dx, screenH / dy, 2);
  scale = Math.max(scale, 0.1);
  var tx = screenW / 2 - cx * scale;
  var ty = screenH / 2 - cy * scale;
  d3.select(app.view).transition().duration(800).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function centerView() {
  var cx = centerAnimPos.x || 0;
  var cy = centerAnimPos.y || 0;
  var tx = screenW / 2 - cx * transform.k;
  var ty = screenH / 2 - cy * transform.k;
  d3.select(app.view).transition().duration(600).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(transform.k));
}

function zoomStep(dir) {
  var factor = dir > 0 ? 1.3 : 1 / 1.3;
  var newK = Math.max(0.05, Math.min(transform.k * factor, 8));
  var cx = screenW / 2, cy = screenH / 2;
  var tx = cx - (cx - transform.x) * (newK / transform.k);
  var ty = cy - (cy - transform.y) * (newK / transform.k);
  d3.select(app.view).transition().duration(300).ease(d3.easeCubicOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(newK));
}

function updateZoomLevel() {
  var pct = Math.round(transform.k * 100);
  var el = document.getElementById('zoom-level');
  if (el) el.textContent = pct + '%';
}

// ===== Data Loading =====
function normalizeGraphData(gData) {
  var rawNodes = gData.nodes || gData.memories || [];
  var rawLinks = gData.links || gData.edges || [];
  var mems = rawNodes.map(function(n) {
    var numId = typeof n.id === 'string' && n.id.match(/^m(\d+)$/) ? parseInt(n.id.slice(1)) : n.id;
    return {
      id: numId,
      content: n.content || n.label || '',
      category: n.category || n.group || 'general',
      importance: n.importance || 5,
      is_forgotten: n.is_forgotten || false,
      is_archived: n.is_archived || false,
      is_static: n.is_static || false,
      parent_memory_id: n.parent_memory_id || null,
      confidence: n.confidence,
      source_count: n.source_count || 1,
      source: n.source || '',
      created_at: n.created_at || '',
      version: n.version || 1,
      tags: n.tags || [],
      forget_after: n.forget_after || null
    };
  });
  var lnks = rawLinks.map(function(l) {
    var src = l.source_id || l.source;
    var tgt = l.target_id || l.target;
    if (typeof src === 'string' && src.match(/^m\d+$/)) src = parseInt(src.slice(1));
    if (typeof tgt === 'string' && tgt.match(/^m\d+$/)) tgt = parseInt(tgt.slice(1));
    return { source: src, target: tgt, similarity: l.similarity || l.weight || 0.5, type: l.type || 'similarity' };
  });
  return { memories: mems, links: lnks };
}

async function loadData() {
  try {
    var gRes = await fetch(BASE + '/graph');
    var gData = await gRes.json();
    var norm = normalizeGraphData(gData);
    memories = norm.memories;
    links = norm.links;
    nodeMap = {};
    memories.forEach(function(m) { nodeMap[m.id] = m; });
    lastMemoryCount = memories.length;
    lastMaxId = memories.reduce(function(mx, m) { return m.id > mx ? m.id : mx; }, 0);
    document.getElementById('stat-nodes').textContent = memories.length;
    document.getElementById('stat-links').textContent = links.length;
    document.getElementById('loading').style.display = 'none';
    computeLayout();
    document.getElementById('stat-clusters').textContent = Object.keys(clusters).length;
    computeAnimatedPositions();
    buildScene();
    _simSettling = true;
    loadTime = performance.now();
    entryProgress = 0;
    // Build UI elements
    buildLegend();
    if (listPanelOpen) renderListPanel();
    updateZoomLevel();
    // Auto-fit view on initial load
    setTimeout(fitView, 100);
    scheduleRefresh();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div class="text" style="color:#f87171">Failed: ' + e.message + '</div>';
  }
}

function scheduleRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refreshData, REFRESH_INTERVAL);
}

async function refreshData() {
  try {
    var gRes = await fetch(BASE + '/graph');
    var gData = await gRes.json();
    var norm = normalizeGraphData(gData);
    var newMems = norm.memories;
    var newLinks = norm.links;
    var newMaxId = newMems.reduce(function(mx, m) { return m.id > mx ? m.id : mx; }, 0);

    if (newMems.length !== lastMemoryCount || newMaxId !== lastMaxId) {
      memories = newMems;
      links = newLinks;
      nodeMap = {};
      memories.forEach(function(m) { nodeMap[m.id] = m; });
      lastMemoryCount = memories.length;
      lastMaxId = newMaxId;
      document.getElementById('stat-nodes').textContent = memories.length;
      document.getElementById('stat-links').textContent = links.length;
      computeLayout();
      document.getElementById('stat-clusters').textContent = Object.keys(clusters).length;
      computeAnimatedPositions();
      buildScene();
      entryProgress = 1;
      buildLegend();
      if (listPanelOpen) renderListPanel();
      if (selectedNode) {
        var updated = nodeMap[selectedNode.id];
        if (updated) openSidebar(updated); else closeSidebar();
      }
    }
  } catch(e) { /* silent retry */ }
  scheduleRefresh();
}

  if (tag === 'INPUT' || tag === 'TEXTAREA') {
    if (e.key === 'Escape') {
      e.target.blur();
      closeSidebar();
    }
    return;
  }
  if (e.key === 'Escape') { closeModal(); closeSidebar(); }
  if (e.key === 'l' || e.key === 'L') toggleListPanel();
  if (e.key === 'n' || e.key === 'N') openCreateDialog();
  if (e.key === 'z' || e.key === 'Z') fitView();
  if (e.key === 'c' && !e.ctrlKey && !e.metaKey) centerView();
  if (e.key === '=' || e.key === '+') zoomStep(1);
  if (e.key === '-') zoomStep(-1);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navNextMemory(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navPrevMemory(); }
});
